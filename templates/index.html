<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Manager Pro | S3 Sync</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="container">
    <div class="upload-section">
        <h2 style="margin-top: 0; color: #4361ee;"><i class="fa-solid fa-cloud-arrow-up"></i> S3 File Manager</h2>
        <form action="/upload" method="POST" enctype="multipart/form-data" id="mainUploadForm">
            <input type="file" name="file" id="fileInput" style="display: none;" onchange="handleUpload()">
            <label for="fileInput" class="upload-btn">
                <i class="fa-solid fa-plus"></i> Upload New File
            </label>
        </form>
        <div id="uploadStatus" style="display:none; margin-top:15px; color: #4361ee; font-weight: 600;">
            <i class="fas fa-circle-notch fa-spin"></i> Syncing with AWS...
        </div>
    </div>

    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search your cloud files..." onkeyup="filterFiles()">
    </div>

    <table>
        <thead>
            <tr>
                <th>FILE NAME</th>
                <th>SIZE</th>
                <th style="text-align: right;">ACTIONS</th>
            </tr>
        </thead>
        <tbody id="fileTable">
            {% for file in files %}
            <tr class="file-row">
                <td class="file-name">
                    <i class="fa-regular 
                        {% if file.name.lower().endswith('.pdf') %}fa-file-pdf
                        {% elif file.name.lower().endswith(('.jpg', '.png', '.jpeg', '.gif')) %}fa-file-image
                        {% elif file.name.lower().endswith(('.mp4', '.mov', '.avi')) %}fa-file-video
                        {% else %}fa-file-lines{% endif %}
                    "></i>
                    <strong>{{ file.name }}</strong>
                </td>
                <td class="file-size">{{ file.size }}</td>
                <td style="text-align: right;">
                    <button onclick="openRename('{{ file.name }}')" class="action-icon rename-btn" title="Rename File">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </button>

                    <a href="{{ file.url }}" target="_blank" class="action-icon view-btn" title="View/Download">
                        <i class="fa-solid fa-eye"></i>
                    </a>

                    <form action="{{ url_for('delete_file', filename=file.name) }}" method="POST" style="display:inline;">
                        <button type="submit" class="action-icon delete-btn" onclick="return confirm('Permanently delete this file?')">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </form>
                </td>
            </tr>
            {% endfor %}
            
            {% if not files %}
            <tr>
                <td colspan="3" style="text-align: center; padding: 50px; color: #aaa;">
                    <i class="fa-solid fa-box-open" style="font-size: 2.5rem; display: block; margin-bottom: 10px;"></i>
                    Your bucket is empty.
                </td>
            </tr>
            {% endif %}
        </tbody>
    </table>
</div>

<form id="renameForm" action="/rename" method="POST" style="display:none;">
    <input type="hidden" name="old_name" id="oldNameInput">
    <input type="hidden" name="new_name" id="newNameInput">
</form>

<script>
// 1. LIVE SEARCH
function filterFiles() {
    let input = document.getElementById('searchInput').value.toLowerCase();
    let rows = document.querySelectorAll('.file-row');
    rows.forEach(row => {
        let name = row.querySelector('.file-name').textContent.toLowerCase();
        row.style.display = name.includes(input) ? "" : "none";
    });
}

// 2. UPLOAD SPINNER
function handleUpload() {
    const input = document.getElementById('fileInput');
    if (input.files.length > 0) {
        document.getElementById('uploadStatus').style.display = "block";
        document.getElementById('mainUploadForm').submit();
    }
}

// 3. RENAME PROMPT
function openRename(oldName) {
    // Ask the user for the new name
    let newName = prompt("Rename file to:", oldName);
    
    // If they typed something and didn't hit cancel
    if (newName && newName.trim() !== "" && newName !== oldName) {
        document.getElementById('oldNameInput').value = oldName;
        document.getElementById('newNameInput').value = newName.trim();
        document.getElementById('renameForm').submit();
    }
}
</script>
<form id="renameForm" action="/rename" method="POST" style="display:none;">
    <input type="hidden" name="old_name" id="oldNameInput">
    <input type="hidden" name="new_name" id="newNameInput">
</form>
</body>
</html>
