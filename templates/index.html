<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud File Manager</title>
    <style>
        :root { --primary: #4361ee; --danger: #ef233c; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 40px; }
        .container { max-width: 850px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        
        /* The NEW Upload Section */
        .upload-section { 
            background: #f1f4ff; 
            padding: 40px; 
            border-radius: 15px; 
            border: 2px dashed #adc1ff; 
            margin-bottom: 40px; 
            text-align: center;
        }

        /* The Custom Button */
        .upload-btn {
            background: var(--primary);
            color: white;
            padding: 14px 35px;
            border-radius: 10px;
            cursor: pointer;
            display: inline-block;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
        }
        .upload-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(67, 97, 238, 0.4); }

        /* Table Design */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #eee; color: #888; text-transform: uppercase; font-size: 0.8rem; }
        td { padding: 18px 15px; border-bottom: 1px solid #f1f1f1; }
        
        .btn-view { color: var(--primary); text-decoration: none; font-weight: 600; margin-right: 20px; }
        .btn-delete { background: none; border: none; color: var(--danger); cursor: pointer; font-weight: 600; font-size: 0.9rem; }
        .btn-delete:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div class="upload-section">
        <h2 style="margin-top: 0;">☁️ Cloud Storage</h2>
        <p style="color: #666; margin-bottom: 25px;">Click below to instantly sync a file to your AWS S3 bucket.</p>
        
        <form action="/upload" method="POST" enctype="multipart/form-data" id="mainUploadForm">
            <input type="file" name="file" id="fileInput" style="display: none;" onchange="autoSubmit()">
            
            <label for="fileInput" class="upload-btn">
                📤 Select & Upload File
            </label>
        </form>
    </div>

    <h3>📂 Recent Files</h3>
    <table>
        <thead>
            <tr>
                <th>File Name</th>
                <th style="text-align: right;">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% if files %}
                {% for file in files %}
                <tr>
                    <td><strong>{{ file.name }}</strong></td>
                    <td style="text-align: right;">
                        <a href="{{ file.url }}" target="_blank" class="btn-view">View</a>
                        <form action="{{ url_for('delete_file', filename=file.name) }}" method="POST" style="display:inline;" onsubmit="return confirm('Delete this file permanently?');">
                            <button type="submit" class="btn-delete">Remove</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            {% else %}
                <tr>
                    <td colspan="2" style="text-align: center; color: #999; padding: 40px;">No files found. Start by uploading one!</td>
                </tr>
            {% endif %}
        </tbody>
    </table>
</div>

<script>
    function autoSubmit() {
        const input = document.getElementById('fileInput');
        if (input.files.length > 0) {
            // Optional: You could add a "Loading..." message here
            document.getElementById('mainUploadForm').submit();
        }
    }
</script>

</body>
</html>
