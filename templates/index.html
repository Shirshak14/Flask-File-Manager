<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Manager Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="container">
    <div class="upload-section">
        <h2><i class="fa-solid fa-cloud"></i> S3 Storage</h2>
        <form action="/upload" method="POST" enctype="multipart/form-data" id="mainUploadForm">
            <input type="file" name="file" id="fileInput" style="display: none;" onchange="handleUpload()">
            <label for="fileInput" class="upload-btn">📤 Select & Upload</label>
        </form>
        <div id="uploadStatus" style="display:none; margin-top:10px; color: #4361ee;">
            <i class="fas fa-spinner fa-spin"></i> Uploading...
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="🔍 Search files..." onkeyup="filterFiles()">
    </div>

    <table>
        <thead>
            <tr>
                <th>FILE NAME</th>
                <th>SIZE</th>
                <th style="text-align: right;">ACTIONS</th>
            </tr>
        </thead>
        <tbody id="fileTable">
            {% for file in files %}
            <tr class="file-row">
                <td class="file-name">
                    <i class="fa-regular 
                        {% if file.name.lower().endswith('.pdf') %}fa-file-pdf
                        {% elif file.name.lower().endswith(('.jpg', '.png', '.jpeg')) %}fa-file-image
                        {% elif file.name.lower().endswith(('.mp4', '.mov')) %}fa-file-video
                        {% else %}fa-file-lines{% endif %}
                    "></i>
                    <strong>{{ file.name }}</strong>
                </td>
                <td style="color: #888;">{{ file.size }}</td>
                <td style="text-align: right;">
                    <a href="{{ file.url }}" target="_blank" class="btn-view"><i class="fa-solid fa-eye"></i></a>
                    <form action="{{ url_for('delete_file', filename=file.name) }}" method="POST" style="display:inline;">
                        <button type="submit" class="btn-delete" onclick="return confirm('Delete?')">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<script>
function filterFiles() {
    let input = document.getElementById('searchInput').value.toLowerCase();
    let rows = document.querySelectorAll('.file-row');
    rows.forEach(row => {
        let name = row.querySelector('.file-name').textContent.toLowerCase();
        row.style.display = name.includes(input) ? "" : "none";
    });
}
function handleUpload() {
    const input = document.getElementById('fileInput');
    if (input.files.length > 0) {
        document.getElementById('uploadStatus').style.display = "block";
        document.getElementById('mainUploadForm').submit();
    }
}
</script>
</body>
</html>
